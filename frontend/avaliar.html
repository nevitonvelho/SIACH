<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SIACH — Avaliação</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .likert-row{display:flex;gap:8px;flex-wrap:wrap}
    .nota-btn{flex:1 1 0;min-width:96px;display:flex;flex-direction:column;align-items:center;gap:2px;
      padding:10px 6px;border-radius:8px;border:1px solid #cfcfcf;background:#fafafa;cursor:pointer;
      transition:all .12s}
    .nota-btn:hover{border-color:#198754}
    .nota-btn .num{font-weight:700;font-size:1.1rem}
    .nota-btn .lbl{font-size:.78rem;color:#6b7280}
    .nota-btn.ativa{background:#198754;border-color:#198754}
    .nota-btn.ativa .num,.nota-btn.ativa .lbl{color:#fff}
  </style>
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom mb-4">
    <div class="container">
      <span class="navbar-brand">SIACH — Avaliação</span>
      <span class="text-muted" id="analista-label"></span>
    </div>
  </nav>

  <main class="container" id="avaliar-root" style="max-width:760px">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0" id="progresso">Carregando…</h1>
      <span class="badge bg-secondary" id="contador"></span>
    </div>
    <div id="conteudo"></div>
    <div class="d-flex justify-content-between mt-4">
      <button class="btn btn-outline-secondary" id="btn-anterior">‹ Anterior</button>
      <button class="btn btn-success" id="btn-proxima">Próxima ›</button>
    </div>
    <div id="msg" class="mt-2 small"></div>
  </main>

  <script src="/static/avaliar.js"></script>
</body>
</html>
